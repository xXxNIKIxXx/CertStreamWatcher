name: Build and Push StammTools Docker Image to GHCR

on:
  release:
    types: [created]

env:
  GHCR_REGISTRY: ghcr.io
  ORG_NAME: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      matrix:
        service: [api, dashboard, collector]
        include:
          - service: api
            image_name: certstream-api
            context: .
            file: services/api/Dockerfile
          - service: dashboard
            image_name: certstream-web
            context: .
            file: services/dashboard/Dockerfile
          - service: collector
            image_name: certstream-collector
            context: .
            file: services/collector/Dockerfile
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v2

      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Extract repository owner (lowercase)
        id: extract-owner
        run: |
          REPO_FULL="${{ github.repository }}"
          REPO_OWNER_RAW="${REPO_FULL%%/*}"
          REPO_OWNER=$(echo "$REPO_OWNER_RAW" | tr '[:upper:]' '[:lower:]')
          echo "REPO_OWNER=$REPO_OWNER" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push ${{ matrix.service }} Image (multi-arch)
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.GHCR_REGISTRY }}/${{ env.REPO_OWNER }}/${{ matrix.image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max