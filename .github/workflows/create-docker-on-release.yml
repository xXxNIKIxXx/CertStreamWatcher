name: Build and Push StammTools Docker Image to GHCR

on:
  release:
    types: [created]

env:
  GHCR_REGISTRY: ghcr.io
  ORG_NAME: ${{ github.repository_owner }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v2

      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v3
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.ORG_NAME }}/stammtools
          tags: |
            type=ref,event=tag
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.created={{timestamp}}
            org.opencontainers.image.version={{ref}}
            org.opencontainers.image.revision={{sha}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and Push Docker Image (multi-arch)
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # build for multiple platforms (x86_64, arm64, armv7 for Raspberry Pi)
          platforms: linux/arm64,linux/arm/v7
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GitHub Actions cache for build layers and also push a registry cache
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PIP_CACHE_DIR=/root/.cache/pip

          # Optionally also use a registry cache image (works with GHCR)
          # cache-from: type=registry,ref=${{ env.GHCR_REGISTRY }}/${{ env.ORG_NAME }}/chordbook:cache
          # cache-to: type=registry,ref=${{ env.GHCR_REGISTRY }}/${{ env.ORG_NAME }}/chordbook:cache,mode=max