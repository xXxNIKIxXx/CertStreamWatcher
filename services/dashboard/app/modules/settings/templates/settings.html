{% extends "base.html" %}
{% block title %}Settings – CertStream Dashboard{% endblock %}

{% block content %}
<div class="container mt-4">
  <h4>Filters</h4>
  <p class="text-muted">Edit JSON list of filter rules. Each rule: <code>{"field":"subject|issuer|dns_names","op":"contains|equals|regex","value":"..."}</code></p>
  <form method="post" action="{{ url_for('settings.settings_save') }}">
    <div class="mb-3">
      <label for="default_action" class="form-label">Default Action</label>
      <select name="default_action" id="default_action" class="form-select mb-3">
        <option value="allow" {% if default_action == 'allow' %}selected{% endif %}>Allow All (default)</option>
        <option value="deny" {% if default_action == 'deny' %}selected{% endif %}>Deny All</option>
      </select>
      <label for="filters_json" class="form-label">Filters (JSON list)</label>
      <textarea name="filters_json" id="filters_json" class="form-control" rows="12">{{ filters_json }}</textarea>
    </div>
    <button class="btn btn-primary" type="submit">Save</button>
  </form>
{% endblock %}
