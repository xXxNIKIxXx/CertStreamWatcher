{% extends "base.html" %}
{% block title %}Filters – CertStream Dashboard{% endblock %}

{% block content %}
<div class="container mt-4">
  <h4>Filters</h4>
  <div id="filters-list"></div>
  <button class="btn btn-success mb-3" onclick="showAddFilterModal()">Add Filter</button>
  <form id="filters-form">
    <input type="hidden" name="filters_json" id="filters_json">
    <div class="mb-3">
      <label for="default_action" class="form-label">Default Action</label>
      <select name="default_action" id="default_action" class="form-select mb-3">
        <option value="allow" {% if default_action == 'allow' %}selected{% endif %}>Allow All (default)</option>
        <option value="deny" {% if default_action == 'deny' %}selected{% endif %}>Deny All</option>
      </select>
    </div>
    <!-- Save Changes button removed, auto-save is enabled -->
  </form>
</div>

<!-- Modal for Add/Edit Filter -->
<div class="modal" tabindex="-1" id="filterModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="filterModalTitle">Add/Edit Filter</h5>
        <button type="button" class="btn-close" onclick="hideFilterModal()"></button>
      </div>
      <div class="modal-body">
        <form id="filter-edit-form">
          <div class="mb-3">
            <label for="filter-field" class="form-label">Field</label>
            <select id="filter-field" class="form-select">
              <option value="subject">subject</option>
              <option value="issuer">issuer</option>
              <option value="dns_names">dns_names</option>
              <option value="ct_entry_type">ct_entry_type</option>
              <option value="scripting_score">scripting_score</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="filter-op" class="form-label">Operation</label>
            <select id="filter-op" class="form-select">
              <option value="contains">contains</option>
              <option value="equals">equals</option>
              <option value="regex">regex</option>
              <option value="gte">gte</option>
              <option value="lte">lte</option>
              <option value="gt">gt</option>
              <option value="lt">lt</option>
              <option value="eq">eq</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="filter-value" class="form-label">Value</label>
            <input type="text" id="filter-value" class="form-control">
          </div>
          <input type="hidden" id="filter-index">
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="hideFilterModal()">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="saveFilter()">Save</button>
      </div>
    </div>
  </div>
</div>

<script>
let filters = {{ filters_json|safe }};

function renderFilters() {
  let html = '<table class="table"><thead><tr><th>Field</th><th>Op</th><th>Value</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
  filters.forEach((f, idx) => {
    if (f === null) return;
    // Status indicator: green if enabled, gray if disabled
    const isEnabled = f.enabled !== false;
    const statusColor = isEnabled ? '#28a745' : '#6c757d';
    const statusText = isEnabled ? 'Enabled' : 'Disabled';
    html += `<tr>
      <td>${f.field}</td>
      <td>${f.op}</td>
      <td>${f.value}</td>
      <td>
        <button class="btn btn-sm" style="background-color: ${statusColor}; color: white; min-width: 90px;" onclick="toggleFilter(${idx})">
          <span style="display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: ${statusColor}; margin-right: 6px;"></span>
          ${isEnabled ? 'Enabled' : 'Disabled'}
        </button>
      </td>
      <td>
        <button class="btn btn-sm btn-warning" onclick="editFilter(${idx})">Edit</button>
        <button class="btn btn-sm btn-danger" onclick="deleteFilter(${idx})">Delete</button>
      </td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('filters-list').innerHTML = html;
}

function autoSaveFilters() {
  const default_action = document.getElementById('default_action').value;
  fetch("{{ url_for('filters.filters_autosave') }}", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-Requested-With": "XMLHttpRequest"
    },
    body: JSON.stringify({
      filters: filters,
      default_action: default_action
    })
  })
    .then(r => r.json())
    .then(data => {
      if (!data.success) {
        // Optionally show error
        console.error("Auto-save failed", data.error);
      }
    })
    .catch(e => console.error("Auto-save error", e));
}

function showAddFilterModal() {
  document.getElementById('filterModalTitle').innerText = 'Add Filter';
  document.getElementById('filter-field').value = 'subject';
  document.getElementById('filter-op').value = 'contains';
  document.getElementById('filter-value').value = '';
  document.getElementById('filter-index').value = '';
  document.getElementById('filterModal').style.display = 'block';
}

function hideFilterModal() {
  document.getElementById('filterModal').style.display = 'none';
}

function saveFilter() {
  const field = document.getElementById('filter-field').value;
  const op = document.getElementById('filter-op').value;
  const value = document.getElementById('filter-value').value;
  const idx = document.getElementById('filter-index').value;
  const filter = { field, op, value, enabled: true };
  if (idx === '') {
    filters.push(filter);
  } else {
    filters[idx] = filter;
  }
  hideFilterModal();
  renderFilters();
  autoSaveFilters();
}

function editFilter(idx) {
  const f = filters[idx];
  document.getElementById('filterModalTitle').innerText = 'Edit Filter';
  document.getElementById('filter-field').value = f.field;
  document.getElementById('filter-op').value = f.op;
  document.getElementById('filter-value').value = f.value;
  document.getElementById('filter-index').value = idx;
  document.getElementById('filterModal').style.display = 'block';
}

function deleteFilter(idx) {
  filters.splice(idx, 1);
  renderFilters();
  autoSaveFilters();
}

function toggleFilter(idx) {
  filters[idx].enabled = !filters[idx].enabled;
  renderFilters();
  autoSaveFilters();
}

document.getElementById('filters-form').onsubmit = function() {
  document.getElementById('filters_json').value = JSON.stringify(filters);
  return true;
};

// Auto-save when default action changes
document.getElementById('default_action').addEventListener('change', function() {
  autoSaveFilters();
});

window.onload = renderFilters;
</script>
{% endblock %}
