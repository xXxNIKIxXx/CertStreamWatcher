{% extends 'base.html' %}
{% block content %}
<h2>Edit CT Log</h2>
<form method="post">
    <div class="form-group">
        <label for="operator_id">Operator</label>
        <select class="form-control" name="operator_id" id="operator_id" required>
            {% for op in operators %}
            <option value="{{ op[0] }}" {% if op[0] == log[1] %}selected{% endif %}>{{ op[1] }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label for="description">Description</label>
        <input type="text" class="form-control" name="description" id="description" value="{{ log[2] }}" required>
    </div>
    <div class="form-group">
        <label for="log_id">Log ID</label>
        <input type="text" class="form-control" name="log_id" id="log_id" value="{{ log[3] }}" required>
    </div>
    <div class="form-group">
        <label for="key">Key</label>
        <input type="text" class="form-control" name="key" id="key" value="{{ log[4] }}">
    </div>
    <div class="form-group">
        <label for="url">URL</label>
        <input type="text" class="form-control" name="url" id="url" value="{{ log[5] }}">
    </div>
    <div class="form-group">
        <label for="mmd">MMD</label>
        <input type="number" class="form-control" name="mmd" id="mmd" value="{{ log[6] }}">
    </div>
    <div class="form-group">
        <label for="state">State (JSON)</label>
        <input type="text" class="form-control" name="state" id="state" value="{{ log[7] }}">
    </div>
    <div class="form-group">
        <label for="temporal_interval_start">Interval Start (ISO8601)</label>
        <input type="text" class="form-control" name="temporal_interval_start" id="temporal_interval_start" value="{{ log[8] }}">
    </div>
    <div class="form-group">
        <label for="temporal_interval_end">Interval End (ISO8601)</label>
        <input type="text" class="form-control" name="temporal_interval_end" id="temporal_interval_end" value="{{ log[9] }}">
    </div>
    <div class="form-group">
        <label for="current_index">Current Index</label>
        <input type="number" class="form-control" name="current_index" id="current_index" value="{{ log[10] }}" disabled>
        <small class="form-text text-muted">This value is managed automatically.</small>
    </div>
    <div class="form-group">
        <label for="log_length">Log Length</label>
        <input type="number" class="form-control" name="log_length" id="log_length" value="{{ log[11] }}" disabled>
        <small class="form-text text-muted">This value is managed automatically.</small>
    </div>
    <div class="form-group form-check">
        <input type="checkbox" class="form-check-input" name="is_tiled" id="is_tiled" {% if log[13] %}checked{% endif %} onchange="toggleTiledFields(this)">
        <label class="form-check-label" for="is_tiled">Tiled Log</label>
    </div>
    <div id="tiled-fields" style="display:{{ '' if log[13] else 'none' }}">
        <div class="form-group">
            <label for="submission_url">Submission URL</label>
            <input type="text" class="form-control" name="submission_url" id="submission_url" value="{{ log[14] }}">
        </div>
        <div class="form-group">
            <label for="monitoring_url">Monitoring URL</label>
            <input type="text" class="form-control" name="monitoring_url" id="monitoring_url" value="{{ log[15] }}">
        </div>
    </div>
    <div class="form-group">
        <label for="status">Status</label>
        <input type="text" class="form-control" name="status" id="status" value="{{ log[12] }}">
    </div>
    <script>
    function toggleTiledFields(cb) {
        document.getElementById('tiled-fields').style.display = cb.checked ? '' : 'none';
    }
    </script>
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{{ url_for('ct_log_sources.list_logs') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
