{% extends 'base.html' %}
{% block content %}
<h2>Edit CT Log Source</h2>
<form method="post">
    <div class="form-group">
        <label for="name">Name</label>
        <input type="text" class="form-control" name="name" id="name" value="{{ log_source[2] }}">
    </div>
    <div class="form-group">
        <label for="url">URL</label>
        <input type="text" class="form-control" name="url" id="url" value="{{ log_source[1] }}" required>
    </div>
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{{ url_for('ct_log_sources.list_log_sources') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
